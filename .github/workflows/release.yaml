name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        run: |
          go mod download
          go build -v -o gogoversion .

      - name: Crear Release
        uses: softprops/action-gh-release@v2
        with:
          files: gogoversion
          generate_release_notes: true
          draft: false
          prerelease: false